name: michwar
description: "MICHWAR — Unified Passenger & Driver ride-hailing platform for the Algerian market."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Backend (Firebase) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3

  # --- Maps & Location ---
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0

  # --- State Management & Routing ---
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0

  # --- Networking & Storage ---
  http: ^1.2.2
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- UI / UX ---
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  pin_code_fields: ^8.0.1

  # --- Device / Permissions / Sharing ---
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  device_info_plus: ^11.1.1
  uuid: ^4.5.1

  # --- Background / Sensors (Adaptive GPS & predictive destinations) ---
  flutter_background_service: ^5.1.0
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A6E57"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
